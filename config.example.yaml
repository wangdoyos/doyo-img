server:
  host: "0.0.0.0"
  port: 9090
  # 生产环境必须设置为实际的外部访问地址（含协议），用于生成图片链接
  # 示例: "https://img.example.com"
  base_url: ""

storage:
  # 存储后端类型：local（本地文件系统）或 s3（S3 兼容对象存储）
  type: "local"
  local:
    data_dir: "./data"
  s3:
    # S3 兼容服务的 Endpoint（不含协议前缀，use_ssl 控制 http/https）
    # AWS S3:       s3.amazonaws.com
    # 阿里云 OSS:   oss-cn-hangzhou.aliyuncs.com
    # 腾讯云 COS:   cos.ap-guangzhou.myqcloud.com
    # MinIO:        localhost:9000
    endpoint: ""
    bucket: ""
    region: ""
    access_key: ""
    secret_key: ""
    use_ssl: true
    path_prefix: "images"

upload:
  max_file_size: 5242880       # 单文件最大字节数（默认 5MB）
  max_batch_size: 10           # 单次最大上传数量
  allowed_formats:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "webp"
    - "svg"
  default_expire_hours: 0      # 默认过期时间（小时），0 = 永不过期
  max_expire_days: 0           # 最大过期天数上限，0 = 不限制

processing:
  compress_enabled: false
  compress_quality: 85
  strip_exif: true             # 自动剥离 JPEG 中的 EXIF 元数据（GPS、设备信息等）
  thumbnail:
    enabled: true
    max_width: 300
    max_height: 300
  watermark:
    enabled: false
    type: "text"               # text（文本水印）或 image（图片水印）
    text: "doyo-img"           # 文本水印内容
    font_path: ""              # 自定义字体路径（TTF/OTF），留空使用内置 ASCII 字体；中文水印需指定 CJK 字体
    font_size: 24
    opacity: 0.3               # 不透明度 0.0 ~ 1.0
    position: "bottom-right"   # top-left, top-right, bottom-left, bottom-right, center
    image_path: ""             # 图片水印 PNG 路径（type 为 image 时使用）
    padding: 20

id:
  length: 8
  alphabet: "0123456789abcdefghijklmnopqrstuvwxyz"

cors:
  # 生产环境建议设置为具体域名，如 ["https://img.example.com"]
  allowed_origins:
    - "*"

rate_limit:
  enabled: true
  requests_per_minute: 30
  burst: 10

cleanup:
  enabled: false
  retention_days: 30           # 全局保留天数，0 = 不按创建时间清理

log:
  level: "info"
