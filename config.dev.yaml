# 开发环境配置 —— 关闭限流、启用 debug 日志
# 使用方法：cp config.dev.yaml config.yaml

server:
  host: "0.0.0.0"
  port: 9090
  base_url: ""

storage:
  type: "local"
  local:
    data_dir: "./data"

upload:
  max_file_size: 10485760   # 10MB，开发环境放宽
  max_batch_size: 20
  allowed_formats:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "webp"
    - "svg"
  default_expire_hours: 0
  max_expire_days: 0

processing:
  compress_enabled: false
  compress_quality: 85
  strip_exif: true
  thumbnail:
    enabled: true
    max_width: 300
    max_height: 300
  watermark:
    enabled: true
    type: "text"
    text: "doyo-img"
    font_path: ""
    font_size: 68
    opacity: 0.1
    position: "bottom-right"
    image_path: ""
    padding: 20

id:
  length: 8
  alphabet: "0123456789abcdefghijklmnopqrstuvwxyz"

cors:
  allowed_origins:
    - "*"

rate_limit:
  enabled: false              # 开发环境关闭限流

cleanup:
  enabled: false
  retention_days: 30

log:
  level: "debug"              # 开发环境启用 debug 日志
